project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."
preserve_hierarchy: true

files:
  - source: "**/Language.properties"
    translation: "/**/%file_name%_%locale%.%file_extension%"
    escape_quotes: 0
    escape_special_characters: 0
    skip_untranslated_strings: true
    ignore:
      - "/modules/dxp/apps/osb/osb-customer/**"
      - "/modules/dxp/apps/osb/osb-distributed-messaging/**"
      - "/modules/dxp/apps/osb/osb-faro/**"
      - "/modules/dxp/apps/osb/osb-koroneiki/**"
      - "/modules/dxp/apps/osb/osb-loop/**"
      - "/modules/dxp/apps/osb/osb-provisioning/**"
      - "/modules/dxp/apps/osb/osb-testray/**"
